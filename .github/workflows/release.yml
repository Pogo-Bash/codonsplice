name: release

# Tag-driven release: builds native binaries for 5 targets, the WASM package,
# publishes to npm + crates.io, and attaches artifacts to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # create releases + upload assets

jobs:
  # ── 1. Native binaries for all 5 targets ───────────────────────────────────
  build-binaries:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin Linux legs to 22.04 (glibc 2.35) so the binaries run on older
          # distros — Ubuntu 22.04, Debian 12 (2.36), etc. Building on
          # ubuntu-latest (24.04 / glibc 2.39) would raise the floor and break
          # those systems, since glibc is forward- but not backward-compatible.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset: splice-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            asset: splice-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            # Build on the Apple-Silicon runners (far better availability than
            # the Intel macos-13 pool, which queues for hours). x86_64-apple-
            # darwin is a first-class cross-target there via Xcode.
            os: macos-latest
            asset: splice-macos-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: splice-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive } # cnvlens-core is a sibling/submodule
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p splice-cli --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/splice"
          if [ -f "$bin.exe" ]; then
            # Windows: ship the raw .exe (asset already ends in .exe).
            cp "$bin.exe" "${{ matrix.asset }}"
          else
            # Unix: tar the `splice` binary into <asset>.tar.gz so install.sh
            # can `curl … | tar xz` it.
            cp "$bin" splice
            tar -czf "${{ matrix.asset }}.tar.gz" splice
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.tar.gz
          if-no-files-found: ignore

  # ── 2. WASM package ────────────────────────────────────────────────────────
  build-wasm:
    name: build wasm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "wasm32-unknown-unknown" }
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: bash scripts/build-wasm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: pkg/

  # ── 3. Publish @codonsplice/* to npm ───────────────────────────────────────
  publish-npm:
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with: { name: pkg, path: pkg }
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for f in pkg/package.json pkg/react/package.json pkg/vue/package.json pkg/svelte/package.json pkg/astro/package.json; do
            [ -f "$f" ] && sed -i "s/\"version\": \"[^\"]*/\"version\": \"$VERSION/" "$f"
          done
          # Keep the framework wrappers' @codonsplice/wasm dependency in lockstep
          # with this release, so `npm i @codonsplice/vue@X` pulls the matching
          # @codonsplice/wasm — not a stale range that resolves to an old engine.
          for f in pkg/react/package.json pkg/vue/package.json pkg/svelte/package.json pkg/astro/package.json; do
            [ -f "$f" ] && sed -i "s#\"@codonsplice/wasm\": \"[^\"]*\"#\"@codonsplice/wasm\": \"^$VERSION\"#" "$f"
          done
      - name: Publish wasm + framework wrappers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in pkg pkg/react pkg/vue pkg/svelte pkg/astro; do
            echo "Publishing $dir..."
            (cd "$dir" && npm publish --access public) \
              || echo "skip $dir (already published at this version?)"
          done

  # ── 4. Publish crates to crates.io ─────────────────────────────────────────
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          # Publish a crate, tolerating only the idempotent "already uploaded at
          # this version" case. Any OTHER failure (e.g. a path dep without a
          # version, or building against a stale registry dep) fails the job —
          # we no longer swallow real errors with `|| echo`.
          publish() {
            local label="$1"; shift
            echo "::group::publish ${label}"
            if cargo publish "$@" 2>&1 | tee /tmp/pub.log; then
              echo "✓ published ${label}"
            elif grep -qiE "already (exists|uploaded)|is already uploaded|crate version .* is already (uploaded|being uploaded)" /tmp/pub.log; then
              echo "= ${label} already on crates.io at this version — skipping"
            else
              echo "::error::publish failed for ${label} (see log above)"
              echo "::endgroup::"
              exit 1
            fi
            echo "::endgroup::"
          }
          # Dependency order: spliceql (no internal deps) → codonsplice-core
          # (depends on spliceql + cnvlens-core, both on crates.io). cnvlens-core
          # is published out-of-band from the cnvlens repo. The `sleep`s give the
          # crates.io index time to propagate so the next crate can resolve the
          # one just published. Not --locked: the published crate is verified by
          # building against registry versions of its path deps, which the
          # workspace lock does not describe.
          publish "spliceql"         -p spliceql
          sleep 30
          publish "codonsplice-core" -p codonsplice-core

  # ── 4b. Verify the compiled binary against the sample BAM ──────────────────
  verify:
    needs: build-binaries
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/download-artifact@v4
        with: { name: splice-linux-x86_64, path: . }
      - name: Unpack the binary
        run: tar -xzf splice-linux-x86_64.tar.gz
      - name: Fetch the sample BAM
        run: |
          mkdir -p sample
          base="https://raw.githubusercontent.com/Pogo-Bash/cnvlens/master/public/sample-data"
          curl -fsSL "$base/NA12878_EGFR.bam" -o sample/NA12878_EGFR.bam
          curl -fsSL "$base/NA12878_EGFR.bam.bai" -o sample/NA12878_EGFR.bam.bai
      - name: Run a region variant query and check a known call
        run: |
          chmod +x splice
          out=$(./splice query \
            'FROM bam "sample/NA12878_EGFR.bam" WHERE chr = "7" CALL variants LIMIT 50')
          echo "$out"
          # A known EGFR-region SNV from the sample (chr7:55002631).
          echo "$out" | grep -q '"pos":55002631' \
            || { echo "::error::expected variant chr7:55002631 not found"; exit 1; }
          echo "✓ compiled binary produced the expected variant"

  # ── 4c. winget manifest (Windows package manager) ──────────────────────────
  winget:
    needs: build-binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate winget manifest
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          url="https://github.com/Pogo-Bash/codonsplice/releases/download/${GITHUB_REF_NAME}/splice-windows-x86_64.exe"
          mkdir -p manifests
          cat > manifests/Pogo-Bash.CodonSplice.yaml <<EOF
          PackageIdentifier: Pogo-Bash.CodonSplice
          PackageVersion: ${ver}
          PackageName: CodonSplice
          Publisher: Pogo-Bash
          License: MIT
          ShortDescription: SpliceQL genomic query engine (splice CLI)
          InstallerType: portable
          Installers:
            - Architecture: x64
              InstallerUrl: ${url}
              InstallerSha256: PLACEHOLDER_SHA256
          ManifestType: singleton
          ManifestVersion: 1.6.0
          EOF
          cat manifests/Pogo-Bash.CodonSplice.yaml
      - uses: actions/upload-artifact@v4
        with: { name: winget-manifest, path: manifests/ }
      # Submission to microsoft/winget-pkgs is a manual/wingetcreate follow-up:
      #   wingetcreate submit --token $WINGET_TOKEN manifests/

  # ── 6. Assemble @codonsplice/cli npm packages from the built binaries ──────
  build-cli-packages:
    name: build cli npm packages
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Collect binaries
        run: |
          mkdir -p /tmp/release
          find artifacts -type f -name 'splice-*' -exec cp {} /tmp/release/ \;
          ls -la /tmp/release
      - name: Build CLI npm packages from local artifacts
        env:
          # Use the binaries we just built instead of re-downloading from the
          # (not-yet-published) GitHub Release.
          RELEASE_ARTIFACTS_DIR: /tmp/release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bash scripts/build-cli-packages.sh "$VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: cli-packages
          path: pkg/cli*/

  # ── 7. Publish @codonsplice/cli* to npm ────────────────────────────────────
  publish-cli:
    name: publish cli npm packages
    needs: [build-cli-packages]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with: { name: cli-packages, path: pkg }
      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          find pkg/cli* -name package.json -exec \
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" {} \;
      - name: Restore executable bits
        # upload/download-artifact does not preserve the +x mode that npm
        # publishes verbatim; restore it so the Unix binaries are runnable.
        run: |
          chmod +x pkg/cli/bin/splice || true
          for d in cli-linux-x64 cli-linux-arm64 cli-darwin-x64; do
            chmod +x "pkg/$d/bin/splice" || true
          done
      - name: Publish cli packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Platform packages first so the main package's optionalDependencies
          # already exist on the registry when someone installs @codonsplice/cli.
          for dir in pkg/cli-linux-x64 pkg/cli-linux-arm64 \
                     pkg/cli-darwin-x64 pkg/cli-win32-x64 pkg/cli; do
            [ -d "$dir" ] && (cd "$dir" && npm publish --access public) \
              || echo "skip $dir"
          done

  # ── 5. GitHub Release with all artifacts + install.sh ──────────────────────
  release:
    needs: [build-wasm, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'splice-*' \) -exec cp {} release/ \;
          cp scripts/install.sh release/install.sh
          (cd release && sha256sum splice-* > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
