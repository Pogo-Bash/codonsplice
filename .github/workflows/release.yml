name: release

# Tag-driven release: builds native binaries for 5 targets, the WASM package,
# publishes to npm + crates.io, and attaches artifacts to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create releases + upload assets

jobs:
  # ── 1. Native binaries for all 5 targets ───────────────────────────────────
  build-binaries:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: splice-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: splice-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            asset: splice-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: splice-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: splice-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive } # cnvlens-core is a sibling/submodule
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p splice-cli --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/splice"
          [ -f "$bin.exe" ] && bin="$bin.exe"
          cp "$bin" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  # ── 2. WASM package ────────────────────────────────────────────────────────
  build-wasm:
    name: build wasm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "wasm32-unknown-unknown" }
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: bash scripts/build-wasm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: pkg/

  # ── 3. Publish @codonsplice/* to npm ───────────────────────────────────────
  publish-npm:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with: { name: pkg, path: pkg }
      - name: Publish wasm + framework wrappers
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in pkg pkg/react pkg/vue pkg/svelte pkg/astro; do
            (cd "$dir" && npm publish --access public) || echo "skip $dir"
          done

  # ── 4. Publish crates to crates.io ─────────────────────────────────────────
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # spliceql first (no internal deps), then the engine.
          cargo publish -p spliceql --locked || echo "spliceql already published"
          sleep 20
          cargo publish -p codonsplice-core --locked || echo "core already published"

  # ── 5. GitHub Release with all artifacts + install.sh ──────────────────────
  release:
    needs: [build-binaries, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'splice-*' \) -exec cp {} release/ \;
          cp scripts/install.sh release/install.sh
          (cd release && sha256sum splice-* > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
