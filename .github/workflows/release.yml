name: release

# Tag-driven release: builds native binaries for 5 targets, the WASM package,
# publishes to npm + crates.io, and attaches artifacts to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # create releases + upload assets

jobs:
  # ── 1. Native binaries for all 5 targets ───────────────────────────────────
  build-binaries:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: splice-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: splice-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            asset: splice-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: splice-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: splice-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive } # cnvlens-core is a sibling/submodule
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --locked -p splice-cli --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/splice"
          if [ -f "$bin.exe" ]; then
            # Windows: ship the raw .exe (asset already ends in .exe).
            cp "$bin.exe" "${{ matrix.asset }}"
          else
            # Unix: tar the `splice` binary into <asset>.tar.gz so install.sh
            # can `curl … | tar xz` it.
            cp "$bin" splice
            tar -czf "${{ matrix.asset }}.tar.gz" splice
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.tar.gz
          if-no-files-found: ignore

  # ── 2. WASM package ────────────────────────────────────────────────────────
  build-wasm:
    name: build wasm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "wasm32-unknown-unknown" }
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: bash scripts/build-wasm.sh
      - uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: pkg/

  # ── 3. Publish @codonsplice/* to npm ───────────────────────────────────────
  publish-npm:
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with: { name: pkg, path: pkg }
      - name: Publish wasm + framework wrappers
        run: |
          for dir in pkg pkg/react pkg/vue pkg/svelte pkg/astro; do
            (cd "$dir" && npm publish --access public) || echo "skip $dir"
          done

  # ── 4. Publish crates to crates.io ─────────────────────────────────────────
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # spliceql first (no internal deps), then the engine.
          cargo publish -p spliceql --locked || echo "spliceql already published"
          sleep 20
          cargo publish -p codonsplice-core --locked || echo "core already published"

  # ── 4b. Verify the compiled binary against the sample BAM ──────────────────
  verify:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: actions/download-artifact@v4
        with: { name: splice-linux-x86_64, path: . }
      - name: Unpack the binary
        run: tar -xzf splice-linux-x86_64.tar.gz
      - name: Fetch the sample BAM
        run: |
          mkdir -p sample
          base="https://raw.githubusercontent.com/Pogo-Bash/cnvlens/master/public/sample-data"
          curl -fsSL "$base/NA12878_EGFR.bam" -o sample/NA12878_EGFR.bam
          curl -fsSL "$base/NA12878_EGFR.bam.bai" -o sample/NA12878_EGFR.bam.bai
      - name: Run a region variant query and check a known call
        run: |
          chmod +x splice
          out=$(./splice query \
            'FROM bam "sample/NA12878_EGFR.bam" WHERE chr = "7" CALL variants LIMIT 50')
          echo "$out"
          # A known EGFR-region SNV from the sample (chr7:55002631).
          echo "$out" | grep -q '"pos":55002631' \
            || { echo "::error::expected variant chr7:55002631 not found"; exit 1; }
          echo "✓ compiled binary produced the expected variant"

  # ── 4c. winget manifest (Windows package manager) ──────────────────────────
  winget:
    needs: build-binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate winget manifest
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          url="https://github.com/Pogo-Bash/codonsplice/releases/download/${GITHUB_REF_NAME}/splice-windows-x86_64.exe"
          mkdir -p manifests
          cat > manifests/Pogo-Bash.CodonSplice.yaml <<EOF
          PackageIdentifier: Pogo-Bash.CodonSplice
          PackageVersion: ${ver}
          PackageName: CodonSplice
          Publisher: Pogo-Bash
          License: MIT
          ShortDescription: SpliceQL genomic query engine (splice CLI)
          InstallerType: portable
          Installers:
            - Architecture: x64
              InstallerUrl: ${url}
              InstallerSha256: PLACEHOLDER_SHA256
          ManifestType: singleton
          ManifestVersion: 1.6.0
          EOF
          cat manifests/Pogo-Bash.CodonSplice.yaml
      - uses: actions/upload-artifact@v4
        with: { name: winget-manifest, path: manifests/ }
      # Submission to microsoft/winget-pkgs is a manual/wingetcreate follow-up:
      #   wingetcreate submit --token $WINGET_TOKEN manifests/

  # ── 5. GitHub Release with all artifacts + install.sh ──────────────────────
  release:
    needs: [build-binaries, build-wasm, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name 'splice-*' \) -exec cp {} release/ \;
          cp scripts/install.sh release/install.sh
          (cd release && sha256sum splice-* > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
